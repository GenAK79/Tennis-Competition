<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Round-Robin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,500;0,700;1,300&display=swap');

  :root {
    --court:    #2D5016;
    --court-mid:#3A6B1E;
    --line:     #F5F0E8;
    --accent:   #C8B400;
    --bg:       #F2EFE9;
    --surface:  #FFFFFF;
    --dark:     #1A1A1A;
    --muted:    #7A7A6E;
    --danger:   #B03A2E;
    --cell-blocked: #1A2E0A;
    --cell-empty: #F8F6F1;
    --border:   #D6D1C8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }

  /* ── HEADER ── */
  header { background: var(--court); color: var(--line); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; border-bottom: 3px solid var(--accent); flex-shrink: 0; }
  .logo { font-weight: 700; font-size: 1.05rem; letter-spacing: .04em; text-transform: uppercase; display: flex; align-items: center; gap: .5rem; white-space: nowrap; }
  .logo-ball { width: 22px; height: 22px; background: var(--accent); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; position: relative; overflow: hidden; flex-shrink: 0; }
  .logo-ball::after { content: ''; position: absolute; width: 30px; height: 8px; border: 2.5px solid var(--court); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(-35deg); }
  .header-nav { display: flex; gap: .25rem; }
  .nav-btn { background: transparent; border: 1.5px solid transparent; color: rgba(245,240,232,.65); font-family: 'DM Sans', sans-serif; font-size: .8rem; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; padding: .35rem .85rem; border-radius: 4px; cursor: pointer; transition: all .15s; }
  .nav-btn:hover { color: var(--line); border-color: rgba(245,240,232,.3); }
  .nav-btn.active { background: rgba(200,180,0,.18); border-color: var(--accent); color: var(--accent); }

  /* ── SCORECARD TABS ── */
  .tabs-bar { background: var(--court-mid); padding: 0 2rem; display: flex; align-items: flex-end; gap: 0; overflow-x: auto; border-bottom: 2px solid rgba(0,0,0,.2); }
  .tabs-bar::-webkit-scrollbar { height: 3px; }
  .tabs-bar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
  .sc-tab { font-family: 'DM Sans', sans-serif; font-size: .8rem; font-weight: 600; color: rgba(245,240,232,.6); background: transparent; border: none; border-bottom: 3px solid transparent; padding: .65rem 1.1rem; cursor: pointer; transition: all .15s; white-space: nowrap; margin-bottom: -2px; letter-spacing: .02em; }
  .sc-tab:hover { color: var(--line); }
  .sc-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(0,0,0,.15); }

  /* ── LAYOUT ── */
  main { padding: 1.25rem 1.5rem; max-width: 1200px; margin: 0 auto; }
  .view { display: none; }
  .view.active { display: block; }
  .page-title { font-size: 1.4rem; font-weight: 700; color: var(--court); margin-bottom: 1.5rem; display: flex; align-items: center; gap: .6rem; }
  .page-title::after { content: ''; flex: 1; height: 2px; background: linear-gradient(to right, var(--accent), transparent); margin-left: .4rem; }

  /* ── SCORECARD TABLE ── */
  .scorecard-wrap { background: var(--surface); border-radius: 8px; border: 1px solid var(--border); overflow-x: auto; box-shadow: 0 2px 12px rgba(0,0,0,.06); width: 100%; }
  table { border-collapse: collapse; width: 100%; table-layout: auto; }
  thead tr th { background: var(--court); color: var(--line); font-family: 'DM Mono', monospace; font-size: .72rem; font-weight: 500; padding: .5rem .35rem; text-align: center; position: sticky; top: 0; z-index: 2; white-space: nowrap; min-width: 52px; }
  thead tr th:first-child { text-align: left; padding-left: .75rem; min-width: 0; width: 30%; max-width: 180px; position: sticky; left: 0; z-index: 3; background: var(--court); }
  tbody tr td { border: 1px solid var(--border); text-align: center; font-family: 'DM Mono', monospace; font-size: .72rem; width: 52px; min-width: 52px; max-width: 90px; height: 48px; padding: 2px 3px; transition: background .1s; vertical-align: middle; }
  tbody tr td.player-label { background: var(--court-mid); color: var(--line); text-align: left; padding: .5rem .5rem .5rem .75rem; font-family: 'DM Sans', sans-serif; font-size: .82rem; font-weight: 500; position: sticky; left: 0; z-index: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 30%; max-width: 180px; min-width: 0; }
  tbody tr td.player-label .num { font-family: 'DM Mono', monospace; font-size: .68rem; opacity: .7; margin-right: .3rem; }
  tbody tr td.blocked { background: var(--cell-blocked); }
  tbody tr td.has-score { background: #EDF6E5; }
  tbody tr td.empty-score { background: var(--cell-empty); color: var(--muted); }
  tbody tr:hover td:not(.blocked):not(.player-label) { background: #F0F8E8; }
  tbody tr:hover td.has-score { background: #DCF0CE; }
  .cell-sets { font-size: .68rem; color: var(--court); font-weight: 500; line-height: 1.5; white-space: normal; word-break: break-word; }
  .cell-pts { font-size: .65rem; color: var(--muted); margin-top: 1px; }
  .cell-pts strong { color: var(--court); font-weight: 700; }
  tbody tr td.totals-col { background: #F7F4EC; font-weight: 700; color: var(--court); border-left: 2px solid var(--accent); font-size: .85rem; min-width: 52px; width: 52px; }
  thead tr th.totals-col { border-left: 2px solid var(--accent); background: var(--court-mid); min-width: 52px; }

  /* ── STATS ── */
  .stats-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .9rem 1.2rem; min-width: 130px; flex: 1; }
  .stat-card .label { font-size: .7rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .25rem; }
  .stat-card .value { font-family: 'DM Mono', monospace; font-size: 1.5rem; font-weight: 500; color: var(--court); }

  /* ── MODAL ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 10px; padding: 1.75rem; width: 460px; max-width: 95vw; box-shadow: 0 8px 40px rgba(0,0,0,.18); border-top: 4px solid var(--accent); }
  .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: .75rem; color: var(--court); }
  .modal .match-info { background: var(--bg); border-radius: 6px; padding: .65rem 1rem; font-size: .85rem; margin-bottom: 1rem; color: var(--muted); line-height: 1.6; }
  .modal .match-info strong { color: var(--dark); }
  .sets-header { display: grid; grid-template-columns: 60px 1fr 1fr 28px; gap: .4rem; align-items: center; margin-bottom: .4rem; }
  .sets-header span { font-size: .68rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); text-align: center; }
  .sets-header span:first-child { text-align: left; }
  .set-row { display: grid; grid-template-columns: 60px 1fr 1fr 28px; gap: .4rem; align-items: center; margin-bottom: .4rem; }
  .set-label { font-size: .78rem; font-weight: 600; color: var(--muted); font-family: 'DM Mono', monospace; }
  .set-input { width: 100%; padding: .5rem .4rem; border: 1.5px solid var(--border); border-radius: 5px; font-family: 'DM Mono', monospace; font-size: 1rem; text-align: center; color: var(--dark); outline: none; transition: border .15s; }
  .set-input:focus { border-color: var(--court); }
  .set-input.invalid { border-color: var(--danger); background: #FFF5F4; }
  .set-remove { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; padding: 0; line-height: 1; opacity: .6; transition: opacity .15s; }
  .set-remove:hover { opacity: 1; color: var(--danger); }
  .add-set-btn { background: none; border: 1.5px dashed var(--border); border-radius: 5px; color: var(--muted); font-size: .78rem; font-family: 'DM Sans', sans-serif; padding: .4rem; width: 100%; cursor: pointer; transition: all .15s; margin-top: .25rem; }
  .add-set-btn:hover { border-color: var(--court); color: var(--court); }
  .score-preview { background: var(--bg); border-radius: 6px; padding: .55rem .85rem; margin: .75rem 0; font-family: 'DM Mono', monospace; font-size: .82rem; color: var(--muted); min-height: 32px; }
  .score-preview .preview-sets { color: var(--dark); font-weight: 500; }
  .score-preview .preview-pts { color: var(--court); font-weight: 700; margin-left: .5rem; }
  .validation-msg { font-size: .75rem; color: var(--danger); min-height: 18px; margin-bottom: .4rem; }
  .modal-actions { display: flex; gap: .6rem; justify-content: flex-end; margin-top: .75rem; }

  /* ── BUTTONS ── */
  .btn { font-family: 'DM Sans', sans-serif; font-size: .82rem; font-weight: 600; padding: .5rem 1.1rem; border-radius: 5px; border: none; cursor: pointer; transition: all .15s; letter-spacing: .02em; }
  .btn-primary { background: var(--court); color: var(--line); }
  .btn-primary:hover { background: var(--court-mid); }
  .btn-accent { background: var(--accent); color: var(--court); }
  .btn-accent:hover { background: #D4BF00; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
  .btn-ghost:hover { border-color: var(--muted); color: var(--dark); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #963224; }
  .btn-sm { padding: .3rem .7rem; font-size: .75rem; }

  /* ── ADMIN ── */
  .admin-section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
  .admin-section h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 1rem; padding-bottom: .5rem; border-bottom: 1px solid var(--border); }
  .admin-section h4 { font-size: .85rem; font-weight: 700; color: var(--court); margin-bottom: .75rem; }

  /* Scorecard manager cards */
  .sc-cards { display: flex; flex-direction: column; gap: .75rem; }
  .sc-card { border: 1.5px solid var(--border); border-radius: 7px; overflow: hidden; }
  .sc-card-header { display: flex; align-items: center; gap: .75rem; padding: .7rem 1rem; background: var(--bg); cursor: pointer; user-select: none; }
  .sc-card-header:hover { background: #EAE7E0; }
  .sc-card-chevron { font-size: .7rem; color: var(--muted); transition: transform .2s; flex-shrink: 0; }
  .sc-card.open .sc-card-chevron { transform: rotate(90deg); }
  .sc-card-name { font-weight: 700; font-size: .9rem; color: var(--dark); flex: 1; }
  .sc-card-meta { font-size: .75rem; color: var(--muted); font-family: 'DM Mono', monospace; }
  .sc-card-body { display: none; padding: 1rem; border-top: 1px solid var(--border); background: var(--surface); }
  .sc-card.open .sc-card-body { display: block; }
  .sc-name-row { display: flex; align-items: center; gap: .6rem; margin-bottom: 1rem; }
  .sc-name-row input { flex: 1; padding: .45rem .75rem; border: 1.5px solid var(--border); border-radius: 5px; font-family: 'DM Sans', sans-serif; font-size: .9rem; color: var(--dark); outline: none; transition: border .15s; }
  .sc-name-row input:focus { border-color: var(--court); }
  .sc-body-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .sc-body-col h4 { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .6rem; }

  .player-list { display: flex; flex-direction: column; gap: .4rem; }
  .player-row { display: flex; align-items: center; gap: .6rem; }
  .player-num { font-family: 'DM Mono', monospace; font-size: .78rem; color: var(--muted); min-width: 20px; text-align: center; }
  .player-row input { flex: 1; padding: .4rem .65rem; border: 1.5px solid var(--border); border-radius: 5px; font-family: 'DM Sans', sans-serif; font-size: .85rem; color: var(--dark); outline: none; transition: border .15s; }
  .player-row input:focus { border-color: var(--court); }
  .count-control { display: flex; align-items: center; gap: .65rem; margin-bottom: .75rem; }
  .count-control button { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--court); background: transparent; color: var(--court); font-size: 1.1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; line-height: 1; }
  .count-control button:hover { background: var(--court); color: var(--line); }
  .count-control .count-val { font-family: 'DM Mono', monospace; font-size: 1.3rem; font-weight: 500; color: var(--court); min-width: 28px; text-align: center; }
  .sc-danger-zone { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
  .inline-confirm { background: #FFF5F4; border: 1.5px solid var(--danger); border-radius: 6px; padding: .6rem .85rem; display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; font-size: .8rem; color: var(--danger); font-weight: 600; }

  .admin-score-table { width: 100%; border-collapse: collapse; }
  .admin-score-table th { background: var(--bg); font-size: .75rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); padding: .5rem .75rem; text-align: left; border-bottom: 1px solid var(--border); }
  .admin-score-table td { padding: .45rem .75rem; border-bottom: 1px solid var(--border); font-size: .85rem; }
  .admin-score-table tr:last-child td { border-bottom: none; }
  .score-badge { font-family: 'DM Mono', monospace; background: #EDF6E5; color: var(--court); border-radius: 4px; padding: .15rem .5rem; font-size: .78rem; white-space: nowrap; }
  .score-badge.empty { background: var(--bg); color: var(--muted); }

  .admin-pin-wrap { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
  .admin-pin-wrap input { padding: .45rem .75rem; border: 1.5px solid var(--border); border-radius: 5px; font-family: 'DM Mono', monospace; font-size: .95rem; width: 140px; outline: none; letter-spacing: .15em; }
  .admin-pin-wrap input:focus { border-color: var(--court); }
  .pin-screen { max-width: 340px; margin: 3rem auto; background: var(--surface); border-radius: 10px; padding: 2rem; text-align: center; border: 1px solid var(--border); border-top: 4px solid var(--court); }
  .pin-screen h2 { font-size: 1.1rem; color: var(--court); margin-bottom: .5rem; }
  .pin-screen p { font-size: .85rem; color: var(--muted); margin-bottom: 1.25rem; }
  .pin-screen input { width: 100%; padding: .6rem .9rem; border: 1.5px solid var(--border); border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 1.1rem; letter-spacing: .2em; text-align: center; outline: none; margin-bottom: .9rem; }
  .pin-screen input:focus { border-color: var(--court); }
  .pin-error { color: var(--danger); font-size: .82rem; margin-top: .4rem; }
  .tag { display: inline-block; font-size: .68rem; text-transform: uppercase; letter-spacing: .08em; padding: .15rem .5rem; border-radius: 3px; font-weight: 600; }
  .tag-admin { background: rgba(200,180,0,.2); color: #6B5900; }
  .clickable-cell { cursor: pointer; }
  .no-data { text-align: center; padding: 2.5rem; color: var(--muted); font-size: .9rem; }
  .no-data .icon { font-size: 2rem; margin-bottom: .5rem; }
  .action-bar { display: flex; align-items: center; gap: .75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .action-bar .spacer { flex: 1; }
  .help-text { font-size: .78rem; color: var(--muted); margin-top: .6rem; font-style: italic; }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--court); color: var(--line); padding: .6rem 1.1rem; border-radius: 6px; font-size: .83rem; font-weight: 500; box-shadow: 0 4px 14px rgba(0,0,0,.2); opacity: 0; transform: translateY(6px); transition: all .2s; pointer-events: none; z-index: 200; border-left: 3px solid var(--accent); }
  .toast.show { opacity: 1; transform: translateY(0); }
  @media (max-width: 600px) { .sc-body-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-ball"></span>Round-Robin Tennis</div>
  <div class="header-nav">
    <button class="nav-btn active" id="btn-scorecard" onclick="showMainView('scorecard', this)">Scorecard</button>
    <button class="nav-btn" id="btn-admin" onclick="showMainView('admin', this)">Admin</button>
  </div>
</header>

<!-- Scorecard tabs — only shown in scorecard view -->
<div id="tabs-bar" class="tabs-bar"></div>

<main>
  <!-- ══ SCORECARD VIEW ══ -->
  <div id="view-scorecard" class="view active">
    <div class="page-title" id="sc-page-title">Scorecard</div>
    <div class="stats-row" id="stats-row"></div>
    <div id="scorecard-container"></div>
    <p class="help-text" id="scorecard-help"></p>
  </div>

  <!-- ══ ADMIN VIEW ══ -->
  <div id="view-admin" class="view">
    <div id="admin-pin-screen" class="pin-screen">
      <h2>Admin Access</h2>
      <p>Enter the admin PIN to continue</p>
      <input type="password" id="pin-input" placeholder="• • • •" maxlength="8"
        onkeydown="if(event.key==='Enter') checkPin()">
      <br>
      <button class="btn btn-primary" style="width:100%" onclick="checkPin()">Unlock</button>
      <div class="pin-error" id="pin-error"></div>
    </div>

    <div id="admin-content" style="display:none">
      <div class="page-title">Admin Panel <span class="tag tag-admin" style="font-size:.6rem">Unlocked</span></div>

      <!-- Scorecard manager -->
      <div class="admin-section">
        <h3>Scorecards</h3>
        <div class="sc-cards" id="admin-sc-cards"></div>
        <div style="margin-top:1rem">
          <button class="btn btn-primary" onclick="addScorecard()">+ Add Scorecard</button>
        </div>
      </div>

      <!-- PIN -->
      <div class="admin-section">
        <h3>Change Admin PIN</h3>
        <div class="admin-pin-wrap">
          <input type="password" id="new-pin" placeholder="New PIN" maxlength="8">
          <button class="btn btn-primary" onclick="changePin()">Update PIN</button>
        </div>
      </div>

      <div class="action-bar" style="margin-top:.5rem">
        <button class="btn btn-ghost" onclick="lockAdmin()">Lock Admin</button>
      </div>
    </div>
  </div>
</main>

<!-- ══ SCORE ENTRY MODAL ══ -->
<div class="modal-overlay" id="score-modal">
  <div class="modal">
    <h3>Enter Match Score</h3>
    <div class="match-info" id="modal-match-info"></div>
    <div class="sets-header">
      <span>Set</span>
      <span id="modal-name-a">Player A</span>
      <span id="modal-name-b">Player B</span>
      <span></span>
    </div>
    <div id="sets-container"></div>
    <button class="add-set-btn" id="add-set-btn" onclick="addSetRow()">+ Add set</button>
    <div class="score-preview" id="score-preview">Enter set scores above</div>
    <div class="validation-msg" id="validation-msg"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger btn-sm" onclick="clearScore()">Clear</button>
      <button class="btn btn-accent" onclick="saveScore()">Save Score</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  DATA MODEL
//  state = {
//    pin: '6767',
//    activeScorecardId: 'sc_xxx',
//    scorecards: [
//      {
//        id: 'sc_xxx',
//        name: 'Group A',
//        players: [{ name: 'Alice' }, ...],
//        matches: { 'r-c': { sets: [[gA,gB],...] }, ... }
//      }, ...
//    ]
//  }
// ══════════════════════════════════════════════════════
const STORAGE_KEY = 'tennis_rr_v3';

function uid() { return 'sc_' + Math.random().toString(36).slice(2, 9); }

function defaultScorecard(name) {
  return {
    id: uid(),
    name: name || 'Group A',
    players: [{ name: 'Player 1' }, { name: 'Player 2' }, { name: 'Player 3' }, { name: 'Player 4' }],
    matches: {}
  };
}

function defaultState() {
  const sc = defaultScorecard('Group A');
  return { pin: '6767', activeScorecardId: sc.id, scorecards: [sc] };
}

let state = loadState();
let modalCtx = null; // { scId, rowPlayer, colPlayer }

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      // force PIN
      s.pin = '6767';
      // migrate old v2 format
      if (!s.scorecards) {
        const sc = defaultScorecard('Group A');
        sc.players = s.players || sc.players;
        sc.matches = s.matches || {};
        s.scorecards = [sc];
        s.activeScorecardId = sc.id;
        delete s.players; delete s.matches;
      }
      if (!s.activeScorecardId && s.scorecards.length) s.activeScorecardId = s.scorecards[0].id;
      return s;
    }
  } catch(e) {}
  return defaultState();
}

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function getActiveScorecard() {
  return state.scorecards.find(s => s.id === state.activeScorecardId) || state.scorecards[0];
}

function getScorecardById(id) { return state.scorecards.find(s => s.id === id); }

// ── TENNIS LOGIC ─────────────────────────────────────
function matchKey(r, c) { return r < c ? `${r}-${c}` : `${c}-${r}`; }
function matchPlayerOrder(r, c) { return r < c ? [r, c] : [c, r]; }

function isValidSet(a, b) {
  if (a === '' || b === '') return false;
  const ga = parseInt(a), gb = parseInt(b);
  if (isNaN(ga) || isNaN(gb) || ga < 0 || gb < 0) return false;
  const hi = Math.max(ga, gb), lo = Math.min(ga, gb);
  if (hi < 6) return false;
  if (hi === 7 && lo === 6) return true;
  if (hi === 6 && lo <= 4) return true;
  if (hi === 7 && lo === 5) return true;
  return false;
}

function setWinner(a, b) {
  if (!isValidSet(a, b)) return null;
  return parseInt(a) > parseInt(b) ? 'a' : 'b';
}

function computeSetsWon(sets) {
  let wA = 0, wB = 0;
  for (const [ga, gb] of sets) {
    const w = setWinner(ga, gb);
    if (w === 'a') wA++; else if (w === 'b') wB++;
  }
  return { wA, wB };
}

function setsWonForRowPlayer(match, r, c) {
  if (!match || !match.sets || !match.sets.length) return 0;
  const { wA, wB } = computeSetsWon(match.sets);
  return r < c ? wA : wB;
}

// ── MAIN VIEW SWITCHING ───────────────────────────────
function showMainView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  document.getElementById('tabs-bar').style.display = name === 'scorecard' ? 'flex' : 'none';
  if (name === 'scorecard') renderScorecard();
  if (name === 'admin') renderAdmin();
}

// ── TABS ─────────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = state.scorecards.map(sc => {
    const active = sc.id === state.activeScorecardId ? 'active' : '';
    return `<button class="sc-tab ${active}" onclick="switchScorecard('${sc.id}')">${esc(sc.name)}</button>`;
  }).join('');
}

function switchScorecard(id) {
  state.activeScorecardId = id;
  saveState();
  renderTabs();
  renderScorecard();
}

// ── SCORECARD ─────────────────────────────────────────
function renderScorecard() {
  renderTabs();
  const sc = getActiveScorecard();
  if (!sc) return;
  document.getElementById('sc-page-title').textContent = sc.name;

  const n = sc.players.length;
  const container = document.getElementById('scorecard-container');
  const statsRow = document.getElementById('stats-row');

  if (n < 2) {
    container.innerHTML = `<div class="no-data"><div class="icon">🎾</div>No players configured.<br>Visit Admin to add players.</div>`;
    statsRow.innerHTML = '';
    return;
  }

  let played = 0;
  const totalMatches = n * (n - 1) / 2;
  const totalSetsWon = Array(n).fill(0);

  for (let r = 0; r < n; r++) for (let c = r + 1; c < n; c++) {
    const m = sc.matches[matchKey(r, c)];
    if (m && m.sets && m.sets.length) {
      played++;
      const { wA, wB } = computeSetsWon(m.sets);
      totalSetsWon[r] += wA;
      totalSetsWon[c] += wB;
    }
  }

  statsRow.innerHTML = `
    <div class="stat-card"><div class="label">Players</div><div class="value">${n}</div></div>
    <div class="stat-card"><div class="label">Matches Played</div><div class="value">${played} / ${totalMatches}</div></div>
    <div class="stat-card"><div class="label">Remaining</div><div class="value">${totalMatches - played}</div></div>
  `;

  let colHeaders = '';
  for (let c = 0; c < n; c++) colHeaders += `<th title="${esc(sc.players[c].name)}">${c + 1}</th>`;
  colHeaders += `<th class="totals-col">Sets Won</th>`;

  let rows = '';
  for (let r = 0; r < n; r++) {
    let cells = `<td class="player-label"><span class="num">${r + 1}.</span>${esc(sc.players[r].name)}</td>`;
    for (let c = 0; c < n; c++) {
      if (r === c) {
        cells += `<td class="blocked"></td>`;
      } else {
        const m = sc.matches[matchKey(r, c)];
        const hasScore = m && m.sets && m.sets.length;
        if (hasScore) {
          const setsStr = m.sets.map(([ga, gb]) => r < c ? `${ga}-${gb}` : `${gb}-${ga}`).join(' ');
          const sw = setsWonForRowPlayer(m, r, c);
          cells += `<td class="has-score clickable-cell" onclick="openModal('${sc.id}',${r},${c})" title="Click to edit">
            <div class="cell-sets">${esc(setsStr)}</div>
            <div class="cell-pts"><strong>${sw}</strong> set${sw !== 1 ? 's' : ''}</div>
          </td>`;
        } else {
          cells += `<td class="empty-score clickable-cell" onclick="openModal('${sc.id}',${r},${c})" title="Click to enter score">–</td>`;
        }
      }
    }
    cells += `<td class="totals-col">${totalSetsWon[r]}</td>`;
    rows += `<tr>${cells}</tr>`;
  }

  container.innerHTML = `
    <div class="scorecard-wrap">
      <table>
        <thead><tr><th>Player ↓ vs →</th>${colHeaders}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  document.getElementById('scorecard-help').textContent =
    'Click any cell to enter or update a score. Row = player, Column = opponent.';
}

// ── MODAL ─────────────────────────────────────────────
function openModal(scId, rowPlayer, colPlayer) {
  modalCtx = { scId, rowPlayer, colPlayer };
  const sc = getScorecardById(scId);
  const [ai, bi] = matchPlayerOrder(rowPlayer, colPlayer);
  const pA = sc.players[ai].name, pB = sc.players[bi].name;

  document.getElementById('modal-match-info').innerHTML =
    `<strong>${esc(pA)}</strong> (${ai + 1}) vs <strong>${esc(pB)}</strong> (${bi + 1})`;
  document.getElementById('modal-name-a').textContent = pA;
  document.getElementById('modal-name-b').textContent = pB;

  const m = sc.matches[matchKey(rowPlayer, colPlayer)];
  const existingSets = (m && m.sets) ? m.sets : [];
  renderSetRows(existingSets.length > 0 ? existingSets : [['', '']]);
  updatePreview();

  document.getElementById('score-modal').classList.add('open');
  setTimeout(() => { const f = document.querySelector('.set-input'); if (f) f.focus(); }, 80);
}

function closeModal() {
  document.getElementById('score-modal').classList.remove('open');
  modalCtx = null;
}

function renderSetRows(sets) {
  const c = document.getElementById('sets-container');
  c.innerHTML = '';
  sets.forEach((set, i) => addSetRowWithValues(i, set[0], set[1]));
  updateAddBtn();
}

function addSetRowWithValues(idx, valA, valB) {
  const c = document.getElementById('sets-container');
  const row = document.createElement('div');
  row.className = 'set-row';
  row.dataset.setIdx = idx;
  row.innerHTML = `
    <span class="set-label">Set ${idx + 1}</span>
    <input class="set-input" type="number" min="0" max="7" value="${valA !== '' ? valA : ''}" placeholder="0" oninput="updatePreview()">
    <input class="set-input" type="number" min="0" max="7" value="${valB !== '' ? valB : ''}" placeholder="0" oninput="updatePreview()">
    <button class="set-remove" onclick="removeSetRow(this)" title="Remove">✕</button>
  `;
  c.appendChild(row);
}

function addSetRow() {
  const rows = document.querySelectorAll('#sets-container .set-row');
  if (rows.length >= 3) return;
  addSetRowWithValues(rows.length, '', '');
  updateAddBtn();
  updatePreview();
}

function removeSetRow(btn) {
  const rows = document.querySelectorAll('#sets-container .set-row');
  if (rows.length <= 1) return;
  btn.closest('.set-row').remove();
  document.querySelectorAll('#sets-container .set-row').forEach((r, i) => {
    r.querySelector('.set-label').textContent = `Set ${i + 1}`;
    r.dataset.setIdx = i;
  });
  updateAddBtn();
  updatePreview();
}

function updateAddBtn() {
  const rows = document.querySelectorAll('#sets-container .set-row');
  document.getElementById('add-set-btn').style.display = rows.length >= 3 ? 'none' : 'block';
}

function getSetValues() {
  return Array.from(document.querySelectorAll('#sets-container .set-row')).map(row => {
    const inputs = row.querySelectorAll('.set-input');
    return [inputs[0].value.trim(), inputs[1].value.trim()];
  });
}

function updatePreview() {
  const sets = getSetValues();
  const preview = document.getElementById('score-preview');
  const msg = document.getElementById('validation-msg');
  document.querySelectorAll('.set-input').forEach(i => i.classList.remove('invalid'));
  let validSets = [], hasInvalid = false;
  const rows = document.querySelectorAll('#sets-container .set-row');
  sets.forEach(([a, b], idx) => {
    if (a === '' && b === '') return;
    if (a === '' || b === '') return;
    if (!isValidSet(a, b)) {
      hasInvalid = true;
      rows[idx].querySelectorAll('.set-input').forEach(i => i.classList.add('invalid'));
    } else {
      validSets.push([parseInt(a), parseInt(b)]);
    }
  });
  if (!validSets.length) { preview.innerHTML = `<span style="color:var(--muted)">Enter set scores above</span>`; msg.textContent = ''; return; }
  const { wA, wB } = computeSetsWon(validSets);
  const [ai, bi] = matchPlayerOrder(modalCtx.rowPlayer, modalCtx.colPlayer);
  const sc = getScorecardById(modalCtx.scId);
  const pA = esc(sc.players[ai].name), pB = esc(sc.players[bi].name);
  const setsStr = validSets.map(([ga, gb]) => `${ga}-${gb}`).join('  ');
  preview.innerHTML = `<span class="preview-sets">${setsStr}</span><span class="preview-pts">→ ${pA} <strong>${wA}</strong> – <strong>${wB}</strong> ${pB}</span>`;
  msg.textContent = hasInvalid ? 'Invalid set score — winner needs ≥6 games, lead by 2 (or 7-6 tiebreak).' : '';
}

function saveScore() {
  if (!modalCtx) return;
  const sets = getSetValues();
  const validSets = [];
  for (const [a, b] of sets) {
    if (a === '' && b === '') continue;
    if (!isValidSet(a, b)) { toast('Fix invalid set scores before saving'); return; }
    validSets.push([parseInt(a), parseInt(b)]);
  }
  if (!validSets.length) { toast('Enter at least one set score'); return; }
  const sc = getScorecardById(modalCtx.scId);
  sc.matches[matchKey(modalCtx.rowPlayer, modalCtx.colPlayer)] = { sets: validSets };
  saveState();
  closeModal();
  renderScorecard();
  if (adminUnlocked) renderAdminScores(modalCtx.scId);
  toast('Score saved');
}

function clearScore() {
  if (!modalCtx) return;
  const sc = getScorecardById(modalCtx.scId);
  delete sc.matches[matchKey(modalCtx.rowPlayer, modalCtx.colPlayer)];
  saveState();
  closeModal();
  renderScorecard();
  if (adminUnlocked) renderAdminScores(modalCtx.scId);
  toast('Score cleared');
}

document.getElementById('score-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── ADMIN ─────────────────────────────────────────────
let adminUnlocked = false;

function checkPin() {
  const val = document.getElementById('pin-input').value;
  if (val === state.pin) {
    adminUnlocked = true;
    document.getElementById('admin-pin-screen').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
    renderAdmin();
  } else {
    document.getElementById('pin-error').textContent = 'Incorrect PIN. Try again.';
    document.getElementById('pin-input').value = '';
  }
}

function lockAdmin() {
  adminUnlocked = false;
  document.getElementById('admin-pin-screen').style.display = 'block';
  document.getElementById('admin-content').style.display = 'none';
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-error').textContent = '';
  showMainView('scorecard', document.getElementById('btn-scorecard'));
}

function renderAdmin() {
  if (!adminUnlocked) return;
  renderAdminScorecardCards();
}

// ── SCORECARD MANAGEMENT ──────────────────────────────
function addScorecard() {
  const sc = defaultScorecard(`Group ${String.fromCharCode(65 + state.scorecards.length)}`);
  state.scorecards.push(sc);
  state.activeScorecardId = sc.id;
  saveState();
  renderAdminScorecardCards();
  renderTabs();
  // Open the new card
  setTimeout(() => {
    const el = document.getElementById('sc-card-' + sc.id);
    if (el) { el.classList.add('open'); }
  }, 50);
}

function renderAdminScorecardCards() {
  const container = document.getElementById('admin-sc-cards');
  container.innerHTML = state.scorecards.map(sc => buildScorecardCard(sc)).join('');
}

function buildScorecardCard(sc) {
  const n = sc.players.length;
  const played = Object.keys(sc.matches).filter(k => sc.matches[k].sets && sc.matches[k].sets.length).length;
  return `
  <div class="sc-card" id="sc-card-${sc.id}">
    <div class="sc-card-header" onclick="toggleCard('${sc.id}')">
      <span class="sc-card-chevron">▶</span>
      <span class="sc-card-name">${esc(sc.name)}</span>
      <span class="sc-card-meta">${n} players · ${played} matches</span>
    </div>
    <div class="sc-card-body">
      <!-- Name -->
      <div class="sc-name-row">
        <input type="text" value="${esc(sc.name)}" placeholder="Scorecard name"
          oninput="updateScName('${sc.id}', this.value)">
      </div>
      <div class="sc-body-grid">
        <!-- Players column -->
        <div class="sc-body-col">
          <h4>Players</h4>
          <div class="count-control">
            <button onclick="adjustScPlayers('${sc.id}', -1)">−</button>
            <span class="count-val" id="count-${sc.id}">${n}</span>
            <button onclick="adjustScPlayers('${sc.id}', 1)">+</button>
          </div>
          <div class="player-list" id="players-${sc.id}">
            ${sc.players.map((p, i) => `
              <div class="player-row">
                <span class="player-num">${i + 1}</span>
                <input type="text" value="${esc(p.name)}" placeholder="Player ${i + 1}"
                  oninput="updateScPlayerName('${sc.id}', ${i}, this.value)">
              </div>`).join('')}
          </div>
        </div>
        <!-- Scores column -->
        <div class="sc-body-col">
          <h4>Scores</h4>
          <div id="admin-scores-${sc.id}">${buildAdminScoreTable(sc)}</div>
        </div>
      </div>
      <!-- Danger zone -->
      <div class="sc-danger-zone">
        <div id="clear-wrap-${sc.id}">
          <button class="btn btn-danger btn-sm" onclick="showClearConfirm('${sc.id}')">Clear Scores</button>
        </div>
        <div id="delete-wrap-${sc.id}">
          ${state.scorecards.length > 1
            ? `<button class="btn btn-ghost btn-sm" style="color:var(--danger);border-color:var(--danger)" onclick="showDeleteConfirm('${sc.id}')">Delete Scorecard</button>`
            : `<span style="font-size:.75rem;color:var(--muted)">Cannot delete the only scorecard</span>`}
        </div>
      </div>
      <div id="inline-confirm-${sc.id}" style="display:none;margin-top:.75rem"></div>
    </div>
  </div>`;
}

function buildAdminScoreTable(sc) {
  const n = sc.players.length;
  if (n < 2) return '<p style="font-size:.8rem;color:var(--muted)">Add players to see matches.</p>';
  let rows = '';
  for (let r = 0; r < n; r++) for (let c = r + 1; c < n; c++) {
    const m = sc.matches[matchKey(r, c)];
    const hasScore = m && m.sets && m.sets.length;
    let disp = `<span class="score-badge empty">–</span>`;
    if (hasScore) {
      const { wA, wB } = computeSetsWon(m.sets);
      const str = m.sets.map(([ga, gb]) => `${ga}-${gb}`).join(' ');
      disp = `<span class="score-badge">${esc(str)}</span> <span style="font-size:.72rem;color:var(--muted)">${wA}–${wB}</span>`;
    }
    rows += `<tr>
      <td style="font-size:.8rem">${r+1}. ${esc(sc.players[r].name)}</td>
      <td style="font-size:.8rem">${c+1}. ${esc(sc.players[c].name)}</td>
      <td>${disp}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="openModal('${sc.id}',${r},${c})">Edit</button></td>
    </tr>`;
  }
  return `<table class="admin-score-table">
    <thead><tr><th>Player A</th><th>Player B</th><th>Score</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderAdminScores(scId) {
  const sc = getScorecardById(scId);
  if (!sc) return;
  const el = document.getElementById('admin-scores-' + scId);
  if (el) el.innerHTML = buildAdminScoreTable(sc);
  // update meta in header
  const card = document.getElementById('sc-card-' + scId);
  if (card) {
    const played = Object.keys(sc.matches).filter(k => sc.matches[k].sets && sc.matches[k].sets.length).length;
    const meta = card.querySelector('.sc-card-meta');
    if (meta) meta.textContent = `${sc.players.length} players · ${played} matches`;
  }
}

function toggleCard(id) {
  document.getElementById('sc-card-' + id).classList.toggle('open');
}

function updateScName(id, val) {
  const sc = getScorecardById(id);
  sc.name = val;
  saveState();
  renderTabs();
  // update card header name live
  const card = document.getElementById('sc-card-' + id);
  if (card) card.querySelector('.sc-card-name').textContent = val || 'Unnamed';
  if (state.activeScorecardId === id) {
    document.getElementById('sc-page-title').textContent = val || 'Scorecard';
  }
}

function adjustScPlayers(id, delta) {
  const sc = getScorecardById(id);
  const n = sc.players.length + delta;
  if (n < 2 || n > 16) return;
  if (delta > 0) {
    sc.players.push({ name: `Player ${sc.players.length + 1}` });
  } else {
    const removed = sc.players.length - 1;
    sc.players.pop();
    Object.keys(sc.matches).forEach(k => {
      const [a, b] = k.split('-').map(Number);
      if (a === removed || b === removed) delete sc.matches[k];
    });
  }
  saveState();
  // Re-render the player list and count in place
  document.getElementById('count-' + id).textContent = sc.players.length;
  document.getElementById('players-' + id).innerHTML = sc.players.map((p, i) => `
    <div class="player-row">
      <span class="player-num">${i + 1}</span>
      <input type="text" value="${esc(p.name)}" placeholder="Player ${i + 1}"
        oninput="updateScPlayerName('${id}', ${i}, this.value)">
    </div>`).join('');
  renderAdminScores(id);
}

function updateScPlayerName(scId, idx, val) {
  const sc = getScorecardById(scId);
  sc.players[idx].name = val;
  saveState();
}

// ── CLEAR / DELETE CONFIRMS ───────────────────────────
function showClearConfirm(id) {
  const el = document.getElementById('inline-confirm-' + id);
  el.style.display = 'block';
  el.innerHTML = `<div class="inline-confirm">
    Clear all scores for this scorecard?
    <button class="btn btn-danger btn-sm" onclick="doClearScores('${id}')">Yes, clear</button>
    <button class="btn btn-ghost btn-sm" onclick="hideConfirm('${id}')">Cancel</button>
  </div>`;
}

function doClearScores(id) {
  const sc = getScorecardById(id);
  sc.matches = {};
  saveState();
  hideConfirm(id);
  renderAdminScores(id);
  renderScorecard();
  toast('Scores cleared');
}

function showDeleteConfirm(id) {
  const sc = getScorecardById(id);
  const el = document.getElementById('inline-confirm-' + id);
  el.style.display = 'block';
  el.innerHTML = `<div class="inline-confirm">
    Delete "<strong>${esc(sc.name)}</strong>" and all its scores?
    <button class="btn btn-danger btn-sm" onclick="doDeleteScorecard('${id}')">Yes, delete</button>
    <button class="btn btn-ghost btn-sm" onclick="hideConfirm('${id}')">Cancel</button>
  </div>`;
}

function doDeleteScorecard(id) {
  if (state.scorecards.length <= 1) { toast('Cannot delete the only scorecard'); return; }
  state.scorecards = state.scorecards.filter(s => s.id !== id);
  if (state.activeScorecardId === id) state.activeScorecardId = state.scorecards[0].id;
  saveState();
  renderAdminScorecardCards();
  renderTabs();
  renderScorecard();
  toast('Scorecard deleted');
}

function hideConfirm(id) {
  const el = document.getElementById('inline-confirm-' + id);
  if (el) { el.style.display = 'none'; el.innerHTML = ''; }
}

// ── PIN ───────────────────────────────────────────────
function changePin() {
  const val = document.getElementById('new-pin').value.trim();
  if (!val) { toast('Enter a new PIN first'); return; }
  state.pin = val;
  saveState();
  document.getElementById('new-pin').value = '';
  toast('PIN updated');
}

// ── UTILS ─────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── INIT ──────────────────────────────────────────────
document.getElementById('tabs-bar').style.display = 'flex';
renderScorecard();
</script>
</body>
</html>
